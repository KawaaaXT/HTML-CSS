<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 007</title>
</head>
<body>
    <h1>Teste De Formulario</h1>
    <form action="cadastro.php">
        <p>
            <label for="iest">Estado</label>
            <select name="estado" id="iest">
                <optgroup label="Regiao Sudeste">
                <option value="MG">Minas Gerais</option>
                <option value="SP">São Paulo</option>
                <option value="RJ">Rio De Janeiro</option>
                </optgroup>
               <optgroup label="Regiao Nordeste">
                <option value="PE" selected>Pernambuco</option>
                <option value="CE">Ceára</option>
                <option value="RN">Rio Grande Do Norte</option>
                <option value="BA">Bahia</option>
               </optgroup>
            </select>
        </p>
        <p>
            <label for="iprofi">Profissão</label>
            <input type="text" name="profi" id="iprofi" list="listaprof" placeholder="Escolha ou Digite Sua Profissão">
            <datalist id="listaprof">
                <option value="Eletrs">Eletricista</option>
                <option value="ADM">Administração</option>
                <option value="RH">Recursos Humanos</option>
            </datalist>
        </p>
        <p>
            <p><label for="imensagem">Mensagem</label></p>
            <textarea name="nmensa" id="imensagem" cols="20" rows="12""></textarea>
        </p>
        <p>
            <input type="submit" value="ENVIAR">
            <input type="reset" value="LIMPAR">
        </p>




    </form>
    
</body>
</html>

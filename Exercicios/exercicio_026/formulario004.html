<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Aula 04</title>
</head>
<body>
    <h1>Teste De Formulario</h1>
    <form action="cadastro.php" autocomplete="on" method="get">
       <fieldset>
        <legend>Dados Pessoais</legend>
         <p><label for="inome">Nome</label>  <input type="text" name="nnome" id="inome" autocomplete="name" required maxlength="20" placeholder="NOME"></p>
       
        <p>
            <label for="isenha">Senha:</label>
            <input type="password" name="nsenha" id="isenha" autocomplete="current-password" required minlength="8" size="10" placeholder="SENHA">
        </p>
        <div>
            <label for="imail">Email</label> <input type="email" name="nmail" id="imail" required placeholder="email" autocomplete="email">
        </div>
        <div>
            <label for="itelefone">Contacto:</label> <input type="tel" name="ntelefone" id="itelefone" autocomplete="tel-national" required pattern="^\(\d{2})\[0-9]{4,5}-[0-9]-{4}$">
        </div>
       </fieldset>
        <!--Estudar Mais Sobre o RegEx-->
        <input type="submit" value="ENVIAR">
        <input type="reset" value="Limpar">



    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARIO AULA 3</title>
</head>
<body>
    <h1>TESTE DE Formulario</h1>
    <form action="cadastro.php" method="post"  autocomplete="on">
        <p><label for="inome">Nome:</label><input type="text" name="nnome" id="inome" placeholder="Nome" size="10" required minlength="8" autocomplete="name"></p>
        <p><label for="isenha">Senha:</label><input type="password" name="nsenha" id="isenha" placeholder="Senha" size="10" required minlength="8" autocomplete="current-password"></p>
        <label for="imedia">Média:</label> <input type="number" name="nmedia" id="imedia" min="0" max="10.00" step="0.5" value="5">
        <p>
            <label for="imes">Periodo Letivo:</label>
            <input type="month" name="nmes" id="imes" value="2026-05">

            
        </p>
        <p>
            <label for="iprova">Mês Do Exame:</label>
            <input type="date" name="nprova" id="iprova" value="2026-05-03">
        </p>
        <p>
            <label for="ihora">Hora Do Exame:</label>
            <input type="time" name="nhora" id="ihora" value="10:12">
        </p>
        <input type="submit" value="Enviar"> <input type="reset" value="Limpar">
    </form>
    
</body>
</html>

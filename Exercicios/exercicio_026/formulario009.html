<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Aula 09</title>
</head>
<body>
    <h1>Teste de Formulario</h1>
    <form action="cadastro.php">
        <label for="inum">Numero</label>
        <input type="range" name="nome" id="inum" min="0" max="10" value="5" oninput="inumero.innerHTML = Number(inum.value)">
        <output id="inumero">5</output>

    
    </form>
</body>
</html>

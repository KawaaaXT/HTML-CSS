<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Aula 05</title>
</head>
<body>
    <h1>Teste de Formulario</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>
            <p>
                <input type="radio" name="sexo" id="ifeminino" checked > <label for="ifeminino">Feminino</label>
            </p>
            <p>
                <input type="radio" name="sexo" id="imasculino" > <label for="imasculino">Masculino</label>
            </p>





        </fieldset>
       <fieldset>
        <legend>Esportes Favoritos</legend>
        <p><input type="checkbox" name="nnfut" id="ifut" required checked> <label for="ifut">FUT</label></p>
        <p><input type="checkbox" name="nnvolei" id="ivolei" required> <label for="ivolei">VÔLEI</label></p>
        <p><input type="checkbox" name="nfmesa" id="ifutmesa" required> <label for="ifutmesa">FUT-MESA</label></p>
        <p><input type="checkbox" name="nfutvo" id="ifutvolei" required> <label for="ifutvolei">FUT-VÔLEI</label></p>
        <input type="submit" value="ENVIAR"> <input type="reset" value="LIMPAR">
       </fieldset>
    </form>
</body>

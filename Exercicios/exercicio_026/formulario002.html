<body>
    <h1>Teste De Formulario</h1>
    <form action="cadastro.php" autocomplete="on" method="post">
        <p><label for="inome">Nome:</label> <input type="text" name="kaua" id="inome" required minlength="5" size="10" placeholder="NOME" autocomplete="username"></p>
        <p><label for="isobrenome">Sobrenome:</label><input type="text" name="pereira" id="isobrenome" required minlength="5" size="10" placeholder="Sobrenome" autocomplete="username"></p>
        <p><label  for="isenha">Senha:</label><input type="password" name="nsenh" id="isenha" required minlength="8" size="10" placeholder="Senha" autocomplete="current-password"></p>

        <input type="reset" value="LIMPAR">
    </form>
